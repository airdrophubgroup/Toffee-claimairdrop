<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toffee Airdrop - Claim</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js" type="application/javascript"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #121212; color: white; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 350px; border: 1px solid #333; }
        h1 { color: #bb86fc; margin-bottom: 10px; }
        p { color: #b0b0b0; margin-bottom: 25px; }
        #connectButton { background: #03dac6; color: #000; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; width: 100%; }
        #connectButton:hover { background: #018786; transform: translateY(-2px); }
        #walletAddress { margin-top: 20px; font-family: monospace; font-size: 12px; color: #03dac6; word-break: break-all; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Toffee Airdrop</h1>
        <p id="status">Connect your wallet to claim</p>
        <button id="connectButton">Connect Wallet</button>
        <div id="walletAddress"></div>
    </div>

    <script type="module" src="backend/index.js"></script>
</body>
</html>
